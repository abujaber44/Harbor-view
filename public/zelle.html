<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zelle Drivers | Harbor View Payroll</title>
  <link rel="stylesheet" href="/styles.css?v=20260415c" />
</head>
<body>
  <main class="page">
    <section class="panel panel-hero">
      <h1>Zelle Drivers</h1>
      <p class="subtext">Maintain the driver list used for Zelle tags, Zelle reporting, and cash-to-keep.</p>
      <div class="page-links">
        <a class="link-chip" href="/">Back To Payroll</a>
        <a class="link-chip" href="/driver-ntd-summary">Settlement Pass</a>
      </div>

      <form id="zelle-form" class="stack-form">
        <label for="zelle-drivers-input">Driver Names (one per line)</label>
        <textarea id="zelle-drivers-input" rows="16" placeholder="Driver One&#10;Driver Two"></textarea>
        <div class="action-row">
          <button id="save-zelle-btn" type="submit">Save Zelle Drivers</button>
        </div>
      </form>

      <div id="zelle-status" class="status" role="status" aria-live="polite">Loading saved drivers...</div>
    </section>
  </main>

  <script src="/zelle.js?v=20260415a"></script>
</body>
</html>
