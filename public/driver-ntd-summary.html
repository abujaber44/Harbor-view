<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Driver NTD Summary | Harbor View Payroll</title>
  <link rel="stylesheet" href="/styles.css?v=20260330e" />
</head>
<body>
  <main class="page">
    <section class="panel panel-hero">
      <h1>Driver NTD Summary</h1>
      <p class="subtext">Summarizes all drivers using Column L (NTD) and Column M (Cash in/out), only for rows where Column D is not empty.</p>
      <div class="page-links">
        <a class="link-chip" href="/">Back To Payroll</a>
      </div>

      <form id="ntd-form" class="form-grid">
        <label>
          Driver Search (Optional)
          <input id="driver-input" name="driver" type="text" placeholder="Leave empty for all drivers" />
        </label>
        <div class="action-stack">
          <button id="ntd-submit-btn" type="submit">Generate Driver Balance Summary</button>
        </div>
      </form>

      <div id="ntd-status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section class="panel panel-table">
      <h2>Summary</h2>
      <div id="ntd-summary-list" class="driver-summary-list"></div>
    </section>
  </main>

  <script src="/driver-ntd-summary.js?v=20260331a"></script>
</body>
</html>
