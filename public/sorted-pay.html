<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorted Driver Pay | Harbor View Payroll</title>
  <link rel="stylesheet" href="/styles.css?v=20260330d" />
</head>
<body>
  <main class="page">
    <section class="panel panel-hero">
      <h1>Sorted Driver Pay</h1>
      <p class="subtext">Drivers are sorted by Zelle status first, then by total pay.</p>
      <div class="page-links">
        <a class="link-chip" href="/">Back To Payroll</a>
        <a class="link-chip" href="/zelle">Manage Zelle Drivers</a>
      </div>

      <div class="action-row">
        <button id="refresh-sorted-btn" type="button">Refresh Sorted Pay</button>
        <button id="cash-report-btn" type="button" class="secondary">Generate Cash Report</button>
        <button id="zelle-report-btn" type="button" class="secondary">Generate Zelle Report</button>
        <button id="cash-keep-report-btn" type="button" class="secondary">Generate Cash To Keep Report</button>
      </div>
      <div id="sorted-status" class="status" role="status" aria-live="polite">Loading sorted driver pay...</div>
    </section>

    <section class="panel panel-table">
      <h2>Sorted Results</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Driver</th>
              <th>Zelle</th>
              <th>Total Amount</th>
              <th>Details</th>
            </tr>
          </thead>
          <tbody id="sorted-body"></tbody>
        </table>
      </div>
    </section>

    <section id="sorted-report-preview" class="panel hidden">
      <h2 id="sorted-report-title">Driver Report</h2>
      <p id="sorted-report-meta" class="subtext"></p>
      <div id="sorted-report-content"></div>
    </section>
  </main>

  <script src="/sorted-pay.js?v=20260330e"></script>
</body>
</html>
